name: "book"

# This workflow is responsible for building and publishing the documentation book
# It runs automatically on every push to the repository

on:
- push


jobs:
  # Generate API documentation using pdoc
  pdoc:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Build the virtual environment for ${{ github.repository }}"
        uses: tschm/cradle/actions/environment@v0.1.68

      - uses: tschm/cradle/actions/pdoc@v0.1.68
        with:
          source-folder: src/antarctic


  # Run tests to ensure documentation examples are valid
  test:
    runs-on: "ubuntu-latest"
    steps:
      # Note: We use MongoMock instead of a real MongoDB instance for testing
      # This makes tests faster and more reliable
      #- name: Start MongoDB
      #  uses: supercharge/mongodb-github-action@1.12.0
      #  with:
      #    mongodb-version: '5.0'
      #    mongodb-db: test
      #    mongodb-port: 27017

      - name: "Build the virtual environment for ${{ github.repository }}"
        uses: tschm/cradle/actions/environment@v0.1.68

      - uses: tschm/cradle/actions/test@v0.1.68
        with:
          tests-folder: src/tests

  # Process Jupyter notebooks for inclusion in the documentation
  jupyter:
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: "Build the virtual environment for ${{ github.repository }}"
        uses: tschm/cradle/actions/environment@v0.1.68

      - uses: tschm/cradle/actions/jupyter@v0.1.68

  # Build and deploy the final documentation book
  # This job only runs after test, pdoc, and jupyter jobs have completed successfully
  book:
    runs-on: "ubuntu-latest"
    needs: [test, pdoc, jupyter]

    # Write permission is needed to update the GitHub Pages site
    permissions:
      contents: write

    steps:
      - name: Checkout [${{ github.repository }}]
        uses: actions/checkout@v4

      - uses: tschm/cradle/actions/book@v0.1.68
